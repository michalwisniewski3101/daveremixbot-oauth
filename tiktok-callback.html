<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'none'; connect-src 'none'; font-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
  <title>TikTok OAuth Callback - DaveRemixBot</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f7f9;
      color: #1d2430;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    section {
      background: #ffffff;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      padding: 28px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    p {
      line-height: 1.55;
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 6px;
      background: #eef4ff;
      border: 1px solid #b8cdfb;
    }

    a {
      color: #0b57d0;
    }
  </style>
  <script src="config.js"></script>
</head>
<body>
  <main>
    <section>
      <h1>TikTok OAuth Callback</h1>
      <p>
        This static page forwards the TikTok OAuth response to your private local DaveRemixBot
        instance. No client secret is stored on this public site.
      </p>
      <div id="status" class="status">Preparing local redirect...</div>
      <p id="manual" hidden>
        Automatic redirect did not start.
        <a id="manual-link" href="#">Continue to local DaveRemixBot</a>
      </p>
    </section>
  </main>

  <script>
    (function () {
      var config = window.DAVEREMIXBOT_OAUTH_BRIDGE || {};
      var callbackUrl = config.localTikTokCallbackUrl ||
        "http://127.0.0.1:5088/integrations/tiktok/oauth/callback";
      var status = document.getElementById("status");
      var manual = document.getElementById("manual");
      var manualLink = document.getElementById("manual-link");

      try {
        var parsedCallback = new URL(callbackUrl);
        if (parsedCallback.protocol !== "http:" && parsedCallback.protocol !== "https:") {
          throw new Error("Unsupported local callback protocol.");
        }

        var target = callbackUrl + window.location.search;
        manualLink.href = target;
        status.textContent = "Redirecting to local DaveRemixBot...";
        manual.hidden = false;
        window.location.replace(target);
      } catch (error) {
        status.textContent = "Bridge configuration is invalid: " + error.message;
        manual.hidden = true;
      }
    })();
  </script>
</body>
</html>
